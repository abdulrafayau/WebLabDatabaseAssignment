<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="../index.html" class="navbar-brand">📚 Web Lab Database</a>
            <ul class="navbar-nav">
                <li><a href="../index.html">Home</a></li>
                <li><a href="student.html">Students</a></li>
                <li><a href="contact.html">Contacts</a></li>
                <li><a href="todo.html">To-Do List</a></li>
                <li><a href="product.html">Products</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">👨‍🎓 Student Record Manager</div>
            <div class="card-body">
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="openAddModal()">+ Add New Student</button>
                    <button class="btn btn-secondary" onclick="loadStudents()">🔄 Refresh</button>
                </div>
            </div>
        </div>

        <div id="studentTableContainer" class="card" style="display: none;">
            <div class="card-header">All Students</div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table id="studentTable">
                        <thead>
                            <tr>
                                <th>Roll #</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Department</th>
                                <th>DOB</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="emptyState" class="card" style="text-align: center;">
            <div class="spinner"></div>
            <p class="mt-3">Loading students...</p>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <button class="modal-close" onclick="closeModal('studentModal')">&times;</button>
            </div>
            <form id="studentForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="rollNumber">Roll Number *</label>
                    <input type="text" id="rollNumber" required>
                </div>
                <div class="form-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber">
                </div>
                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth</label>
                    <input type="date" id="dateOfBirth">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Business">Business</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Arts">Arts</option>
                        <option value="Science">Science</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save Student</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('studentModal')">Cancel</button>
                </div>
                <input type="hidden" id="studentId">
            </form>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script>
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', loadStudents);

        async function loadStudents() {
            try {
                showLoading(true);
                const students = await ApiHelper.get('/students');
                
                if (students.length === 0) {
                    document.getElementById('studentTableContainer').style.display = 'none';
                    document.getElementById('emptyState').innerHTML = '<p style="padding: 2rem;">No students found. Click "Add New Student" to create one.</p>';
                } else {
                    displayStudents(students);
                    document.getElementById('studentTableContainer').style.display = 'block';
                    document.getElementById('emptyState').style.display = 'none';
                }
            } catch (error) {
                Notification.error('Failed to load students: ' + error.message);
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        function displayStudents(students) {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';

            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${student.rollNumber}</strong></td>
                    <td>${student.firstName} ${student.lastName}</td>
                    <td>${student.email}</td>
                    <td>${student.phoneNumber || '-'}</td>
                    <td>${student.department || '-'}</td>
                    <td>${student.dateOfBirth ? formatDate(student.dateOfBirth) : '-'}</td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-info btn-sm" onclick="editStudent(${student.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteStudent(${student.id})">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function openAddModal() {
            currentEditId = null;
            resetForm('studentForm');
            document.getElementById('modalTitle').textContent = 'Add New Student';
            Modal.show('studentModal');
        }

        async function editStudent(id) {
            try {
                const student = await ApiHelper.get(`/students/${id}`);
                document.getElementById('studentId').value = student.id;
                document.getElementById('rollNumber').value = student.rollNumber;
                document.getElementById('firstName').value = student.firstName;
                document.getElementById('lastName').value = student.lastName;
                document.getElementById('email').value = student.email;
                document.getElementById('phoneNumber').value = student.phoneNumber || '';
                document.getElementById('dateOfBirth').value = student.dateOfBirth ? student.dateOfBirth.split('T')[0] : '';
                document.getElementById('department').value = student.department || '';
                
                currentEditId = id;
                document.getElementById('modalTitle').textContent = 'Edit Student';
                Modal.show('studentModal');
            } catch (error) {
                Notification.error('Failed to load student: ' + error.message);
            }
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;

            try {
                await ApiHelper.delete(`/students/${id}`);
                Notification.success('Student deleted successfully!');
                loadStudents();
            } catch (error) {
                Notification.error('Failed to delete student: ' + error.message);
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();

            // Validation
            const rollNumber = document.getElementById('rollNumber').value.trim();
            const firstName = document.getElementById('firstName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();

            if (!Validator.validateRequired(rollNumber)) {
                Notification.warning('Roll Number is required');
                return;
            }

            if (!Validator.validateRequired(firstName)) {
                Notification.warning('First Name is required');
                return;
            }

            if (!Validator.validateEmail(email)) {
                Notification.warning('Please enter a valid email');
                return;
            }

            if (phone && !Validator.validatePhone(phone)) {
                Notification.warning('Please enter a valid phone number');
                return;
            }

            const studentData = {
                rollNumber,
                firstName,
                lastName: document.getElementById('lastName').value.trim(),
                email,
                phoneNumber: phone,
                dateOfBirth: document.getElementById('dateOfBirth').value,
                department: document.getElementById('department').value
            };

            try {
                if (currentEditId) {
                    studentData.id = currentEditId;
                    await ApiHelper.put(`/students/${currentEditId}`, studentData);
                    Notification.success('Student updated successfully!');
                } else {
                    await ApiHelper.post('/students', studentData);
                    Notification.success('Student added successfully!');
                }
                Modal.hide('studentModal');
                loadStudents();
            } catch (error) {
                Notification.error('Error saving student: ' + error.message);
            }
        }

        function closeModal(modalId) {
            Modal.hide(modalId);
        }
    </script>
</body>
</html>
